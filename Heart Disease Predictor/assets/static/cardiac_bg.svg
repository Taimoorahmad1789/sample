        994,655
        1002,655 1010,655 1014,652 1018,655
        1027,655 1034,655 1038,638 1042,672 1044,628 1046,665 1050,655
        1080,655 1088,655 1092,652 1096,655
        1105,655 1112,655 1116,638 1120,672 1122,628 1124,665 1128,655
        1158,655 1166,655 1170,652 1174,655
        1183,655 1190,655 1194,638 1198,672 1200,628 1202,665 1206,655
        1236,655 1244,655 1248,652 1252,655
        1261,655 1268,655 1272,638 1276,672 1278,628 1280,665 1284,655
        1314,655 1322,655 1326,652 1330,655
        1339,655 1346,655 1350,638 1354,672 1356,628 1358,665 1362,655
        1392,655 1400,655 1404,652 1408,655
        1417,655 1424,655 1428,638 1432,672 1434,628 1436,665 1440,655
      "
    />
  </g>

  <!-- ═══════════════════════════════════════════════════════
       VERTICAL ECG STRIP  (x ≈ 442, from top to bottom strip)
       ═══════════════════════════════════════════════════════ -->
  <g filter="url(#ecgGlow)" opacity="0.8">
    <polyline fill="none" stroke="#c53030" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"
      points="
        442,135
        442,165  442,175  439,179  442,183
        442,192  442,199  425,203  459,207  415,209  452,213  442,223
        442,253  442,261  439,265  442,269
        442,278  442,285  425,289  459,293  415,295  452,299  442,309
        442,339  442,347  439,351  442,355
        442,364  442,371  425,375  459,379  415,381  452,385  442,395
        442,425  442,433  439,437  442,441
        442,450  442,457  425,461  459,465  415,467  452,471  442,481
        442,511  442,519  439,523  442,527
        442,536  442,543  425,547  459,551  415,553  452,557  442,567
        442,597  442,605  439,609  442,613
        442,622  442,629  425,633  459,637  415,639  452,643  442,655
      "
    />
  </g>

  <!-- ═══════════════════════════════════════════════════════
       HEART OUTLINE — centered at (780, 400)
       Classic love-heart, large and subtle (matches user image)
       ═══════════════════════════════════════════════════════ -->
  <g filter="url(#heartGlow)" opacity="0.18">
    <!-- Main heart path using cubic bezier curves -->
    <path
      d="M780,520 C680,450 580,390 580,300 C580,240 630,200 680,200 C720,200 760,220 780,250 C800,220 840,200 880,200 C930,200 980,240 980,300 C980,390 880,450 780,520 Z"
      fill="none" stroke="#c53030" stroke-width="3"
    />
    <!-- Inner heart / aorta decorative lines -->
    <path
      d="M780,250 C780,230 770,215 760,210"
      fill="none" stroke="#c53030" stroke-width="1.5" opacity="0.7"
    />
    <path
      d="M780,250 C780,230 790,215 800,210"
      fill="none" stroke="#c53030" stroke-width="1.5" opacity="0.7"
    />
  </g>

  <!-- ═══════════════════════════════════════════════════════
       SMALL SCATTERED HEARTS
       ═══════════════════════════════════════════════════════ -->
  <g opacity="0.18" fill="#c53030">
    <!-- heart at left ~(120, 290) -->
    <path transform="translate(120,290) scale(0.6)"
      d="M0,14 C-4,10 -12,5 -12,-4 C-12,-10 -6,-14 0,-10 C6,-14 12,-10 12,-4 C12,5 4,10 0,14 Z"/>
    <!-- heart at left ~(310, 525) -->
    <path transform="translate(310,525) scale(0.5)"
      d="M0,14 C-4,10 -12,5 -12,-4 C-12,-10 -6,-14 0,-10 C6,-14 12,-10 12,-4 C12,5 4,10 0,14 Z"/>
    <!-- heart near top center ~(680, 230) -->
    <path transform="translate(680,230) scale(0.55)"
      d="M0,14 C-4,10 -12,5 -12,-4 C-12,-10 -6,-14 0,-10 C6,-14 12,-10 12,-4 C12,5 4,10 0,14 Z"/>
    <!-- heart right ~(1310, 285) -->
    <path transform="translate(1310,285) scale(0.55)"
      d="M0,14 C-4,10 -12,5 -12,-4 C-12,-10 -6,-14 0,-10 C6,-14 12,-10 12,-4 C12,5 4,10 0,14 Z"/>
    <!-- heart bottom-center ~(660, 635) -->
    <path transform="translate(660,635) scale(0.5)"
      d="M0,14 C-4,10 -12,5 -12,-4 C-12,-10 -6,-14 0,-10 C6,-14 12,-10 12,-4 C12,5 4,10 0,14 Z"/>
    <!-- heart right-mid ~(1200, 500) -->
    <path transform="translate(1200,500) scale(0.5)"
      d="M0,14 C-4,10 -12,5 -12,-4 C-12,-10 -6,-14 0,-10 C6,-14 12,-10 12,-4 C12,5 4,10 0,14 Z"/>
    <!-- heart bottom-left ~(210, 660) -->
    <path transform="translate(210,660) scale(0.45)"
      d="M0,14 C-4,10 -12,5 -12,-4 C-12,-10 -6,-14 0,-10 C6,-14 12,-10 12,-4 C12,5 4,10 0,14 Z"/>
  </g>
</svg>
