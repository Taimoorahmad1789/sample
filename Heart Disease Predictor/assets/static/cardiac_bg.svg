<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Dark navy blue gradient background (matches user image) -->
    <radialGradient id="bgGrad" cx="55%" cy="45%" r="65%">
      <stop offset="0%"   stop-color="#1a2a5e"/>
      <stop offset="55%"  stop-color="#0e1a42"/>
      <stop offset="100%" stop-color="#060d22"/>
    </radialGradient>

    <!-- ECG glow filter -->
    <filter id="ecgGlow" x="-5%" y="-100%" width="110%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Heart glow filter -->
    <filter id="heartGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="810" fill="url(#bgGrad)"/>

  <!-- ═══════════════════════════════════════════════════════
       TOP HORIZONTAL ECG STRIP  (y ≈ 135)
       Pattern: flat → P-wave bump → QRS spike → T-wave → flat
       ═══════════════════════════════════════════════════════ -->
  <g filter="url(#ecgGlow)" opacity="0.85">
    <polyline fill="none" stroke="#c53030" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"
      points="
        0,135
        30,135  38,135  42,132  46,135
        55,135  62,135  66,118  70,155  72,110  74,148  78,135
        108,135 116,135 120,132 124,135
        133,135 140,135 144,118 148,155 150,110 152,148 156,135
        186,135 194,135 198,132 202,135
        211,135 218,135 222,118 226,155 228,110 230,148 234,135
        264,135 272,135 276,132 280,135
        289,135 296,135 300,118 304,155 306,110 308,148 312,135
        342,135 350,135 354,132 358,135
        367,135 374,135 378,118 382,155 384,110 386,148 390,135
        420,135 428,135 432,132 436,135
        441,135
      "
    />
    <!-- Right half of top strip -->
    <polyline fill="none" stroke="#c53030" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"
      points="
        999,135
        1005,135 1013,135 1017,132 1021,135
        1030,135 1037,135 1041,118 1045,155 1047,110 1049,148 1053,135
        1083,135 1091,135 1095,132 1099,135
        1108,135 1115,135 1119,118 1123,155 1125,110 1127,148 1131,135
        1161,135 1169,135 1173,132 1177,135
        1186,135 1193,135 1197,118 1201,155 1203,110 1205,148 1209,135
        1239,135 1247,135 1251,132 1255,135
        1264,135 1271,135 1275,118 1279,155 1281,110 1283,148 1287,135
        1317,135 1325,135 1329,132 1333,135
        1342,135 1349,135 1353,118 1357,155 1359,110 1361,148 1365,135
        1395,135 1403,135 1407,132 1411,135
        1420,135 1427,135 1431,118 1435,155 1437,110 1439,148
        1440,135
      "
    />
  </g>

  <!-- ═══════════════════════════════════════════════════════
       BOTTOM HORIZONTAL ECG STRIP  (y ≈ 655)
       ═══════════════════════════════════════════════════════ -->
  <g filter="url(#ecgGlow)" opacity="0.8">
    <polyline fill="none" stroke="#c53030" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"
